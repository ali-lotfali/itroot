
<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نمایش IP واقعی کامپیوتر</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(145deg, #f0f4fa 0%, #dce3ed 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      direction: rtl;
    }

    .workflow-card {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 2rem;
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(255, 255, 255, 0.4);
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #0b1a2b;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    h1 i {
      color: #1e6f9f;
    }

    .subtitle {
      color: #3d5a78;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      border-bottom: 2px dashed #b8ccdf;
      padding-bottom: 0.7rem;
    }

    .ip-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 550px) {
      .ip-grid {
        grid-template-columns: 1fr;
      }
    }

    .ip-box {
      background: #0b1a2b;
      border-radius: 1.4rem;
      padding: 1.2rem 0.8rem;
      box-shadow: inset 0 4px 12px rgba(0,0,0,0.6), 0 8px 20px rgba(0, 20, 40, 0.3);
      border: 1px solid #2a4560;
      transition: all 0.2s;
    }

    .ip-box:hover {
      transform: scale(1.02);
      border-color: #4a8ab5;
    }

    .ip-box .label {
      font-size: 0.8rem;
      color: #8ba3c7;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 400;
      display: block;
      margin-bottom: 6px;
    }

    .ip-box .label i {
      margin-left: 6px;
    }

    .ip-value {
      font-size: 1.5rem;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: #b9e6ff;
      word-break: break-all;
      min-height: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-shadow: 0 0 15px rgba(70, 170, 255, 0.3);
    }

    .ip-value .placeholder {
      color: #5f7b9c;
      font-weight: 400;
      font-size: 0.95rem;
    }

    .ip-value .local-ip-badge {
      background: #1d8a4f;
      color: #d4ffdd;
      font-size: 0.6rem;
      padding: 2px 10px;
      border-radius: 30px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .btn-ip {
      background: #1b3b5a;
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #f0f9ff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: 0.15s ease;
      box-shadow: 0 8px 0 #0d2233, 0 10px 25px rgba(0, 0, 0, 0.25);
      border: 1px solid #3e6a8f;
      width: 100%;
      max-width: 320px;
      margin: 0 auto 0.5rem;
    }

    .btn-ip i {
      color: #9bc9ff;
    }

    .btn-ip:hover {
      background: #254f72;
      transform: translateY(-3px);
      box-shadow: 0 10px 0 #0d2233, 0 18px 30px rgba(0, 0, 0, 0.3);
    }

    .btn-ip:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #0d2233;
    }

    .btn-ip:disabled {
      opacity: 0.6;
      transform: translateY(4px);
      box-shadow: 0 4px 0 #0d2233;
      pointer-events: none;
    }

    .status-message {
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #1e4060;
      background: rgba(60, 130, 200, 0.08);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      display: inline-block;
      border: 1px solid rgba(60, 130, 200, 0.12);
    }

    .status-message i {
      margin-left: 8px;
    }

    .footer-note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #5f748b;
      opacity: 0.7;
    }

    .loading-spinner {
      display: inline-block;
      width: 1.6rem;
      height: 1.6rem;
      border: 3px solid rgba(255,255,255,0.15);
      border-top: 3px solid #7bb3ff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="workflow-card">
  <h1>
    <i class="fas fa-microchip"></i> 
    IP واقعی کامپیوتر
  </h1>
  <div class="subtitle">نمایش آدرس IP محلی (واقعی) + IP عمومی</div>

  <div class="ip-grid">
    <!-- IP محلی (واقعی) -->
    <div class="ip-box">
      <span class="label"><i class="fas fa-laptop"></i> IP محلی (واقعی)</span>
      <div id="localIp" class="ip-value">
        <i class="fas fa-circle-notch fa-spin" style="color: #4a8ab5; font-size: 1.2rem;"></i>
        <span class="placeholder">دریافت نشده</span>
      </div>
    </div>

    <!-- IP عمومی -->
    <div class="ip-box">
      <span class="label"><i class="fas fa-globe"></i> IP عمومی</span>
      <div id="publicIp" class="ip-value">
        <i class="fas fa-circle-notch fa-spin" style="color: #4a8ab5; font-size: 1.2rem;"></i>
        <span class="placeholder">دریافت نشده</span>
      </div>
    </div>
  </div>

  <button id="fetchIpBtn" class="btn-ip">
    <i class="fas fa-sync-alt"></i> 
    نمایش IP واقعی
  </button>

  <div id="statusMessage" class="status-message">
    <i class="fas fa-info-circle"></i> 
    برای دریافت IP کلیک کنید
  </div>

  <div class="footer-note">
    <i class="fas fa-shield-alt"></i> 
    IP محلی از WebRTC و IP عمومی از ipify دریافت می‌شود
  </div>
</div>

<script>
  (function() {
    const localIpDisplay = document.getElementById('localIp');
    const publicIpDisplay = document.getElementById('publicIp');
    const fetchBtn = document.getElementById('fetchIpBtn');
    const statusMsg = document.getElementById('statusMessage');

    function setStatus(text, type = 'info') {
      statusMsg.innerHTML = '';
      const icon = document.createElement('i');
      const colors = {
        info: '#1e4060',
        success: '#1b7a3d',
        error: '#b13e3e',
        loading: '#1e6f9f'
      };
      const icons = {
        info: 'fa-info-circle',
        success: 'fa-check-circle',
        error: 'fa-exclamation-triangle',
        loading: 'fa-spinner fa-pulse'
      };
      icon.className = `fas ${icons[type] || icons.info}`;
      statusMsg.style.color = colors[type] || colors.info;
      statusMsg.appendChild(icon);
      statusMsg.appendChild(document.createTextNode(' ' + text));
    }

    // دریافت IP محلی از طریق WebRTC
    function getLocalIP() {
      return new Promise((resolve, reject) => {
        // ایجاد Connection برای دریافت IP
        const pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        pc.createDataChannel('');

        pc.createOffer()
          .then(offer => pc.setLocalDescription(offer))
          .catch(err => reject(err));

        let localIP = null;

        pc.onicecandidate = (event) => {
          if (event.candidate) {
            const candidate = event.candidate.candidate;
            // استخراج IP از رشته candidate
            const ipRegex = /([0-9]{1,3}\.){3}[0-9]{1,3}/;
            const match = candidate.match(ipRegex);
            if (match) {
              localIP = match[0];
              // فیلتر کردن IPهای محلی (192.168.x.x, 10.x.x.x, 172.16-31.x.x)
              const parts = localIP.split('.');
              const firstOctet = parseInt(parts[0]);
              const secondOctet = parseInt(parts[1]);
              if (
                (firstOctet === 192 && secondOctet === 168) ||
                (firstOctet === 10) ||
                (firstOctet === 172 && secondOctet >= 16 && secondOctet <= 31)
              ) {
                // IP معتبر محلی پیدا شد
                pc.close();
                resolve(localIP);
              }
            }
          }
        };

        // زمان‌آوت برای جلوگیری از گیر کردن
        setTimeout(() => {
          pc.close();
          if (localIP) {
            resolve(localIP);
          } else {
            reject(new Error('IP محلی پیدا نشد'));
          }
        }, 5000);
      });
    }

    // دریافت IP عمومی
    async function getPublicIP() {
      const response = await fetch('https://api.ipify.org?format=json', {
        method: 'GET',
        headers: { 'Accept': 'application/json' }
      });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      const data = await response.json();
      return data.ip;
    }

    // تابع اصلی دریافت هر دو IP
    async function fetchAllIPs() {
      fetchBtn.disabled = true;
      fetchBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> در حال دریافت...';
      setStatus('در حال دریافت IPها ...', 'loading');

      // نمایش وضعیت در حال بارگذاری
      localIpDisplay.innerHTML = `
        <i class="fas fa-circle-notch fa-spin" style="color: #4a8ab5; font-size: 1.2rem;"></i>
        <span class="placeholder">دریافت ...</span>
      `;
      publicIpDisplay.innerHTML = `
        <i class="fas fa-circle-notch fa-spin" style="color: #4a8ab5; font-size: 1.2rem;"></i>
        <span class="placeholder">دریافت ...</span>
      `;

      try {
        // دریافت هر دو IP به صورت همزمان
        const [localIP, publicIP] = await Promise.all([
          getLocalIP(),
          getPublicIP()
        ]);

        // نمایش IP محلی
        localIpDisplay.innerHTML = `
          <i class="fas fa-network-wired" style="color: #6db3ff; font-size: 1.3rem;"></i>
          <span>${localIP}</span>
          <span class="local-ip-badge">واقعی</span>
        `;

        // نمایش IP عمومی
        publicIpDisplay.innerHTML = `
          <i class="fas fa-globe" style="color: #6db3ff; font-size: 1.3rem;"></i>
          <span>${publicIP}</span>
        `;

        setStatus(`✅ IP محلی: ${localIP} | IP عمومی: ${publicIP}`, 'success');

      } catch (error) {
        console.error('خطا:', error);
        
        // اگر IP محلی دریافت نشد
        if (error.message.includes('محلی')) {
          localIpDisplay.innerHTML = `
            <i class="fas fa-exclamation-circle" style="color: #ff8a8a;"></i>
            <span style="color: #ffb3b3; font-size: 0.9rem;">دریافت نشد</span>
          `;
        } else {
          localIpDisplay.innerHTML = `
            <i class="fas fa-exclamation-circle" style="color: #ff8a8a;"></i>
            <span style="color: #ffb3b3; font-size: 0.9rem;">خطا</span>
          `;
        }

        // اگر IP عمومی دریافت نشد
        publicIpDisplay.innerHTML = `
          <i class="fas fa-exclamation-circle" style="color: #ff8a8a;"></i>
          <span style="color: #ffb3b3; font-size: 0.9rem;">خطا در دریافت</span>
        `;

        setStatus(`❌ خطا: ${error.message || 'مشکل در ارتباط'}`, 'error');

      } finally {
        fetchBtn.disabled = false;
        fetchBtn.innerHTML = '<i class="fas fa-sync-alt"></i> نمایش IP واقعی';
      }
    }

    fetchBtn.addEventListener('click', fetchAllIPs);

    // پیام اولیه
    setStatus('برای دریافت IP واقعی (محلی) کلیک کنید', 'info');
  })();
</script>

</body>
</html>
